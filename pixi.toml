[workspace]
authors = ["Mads-Peter <machri@phys.au.dk>"]
channels = ["conda-forge"]
name = "jupyterlite-playground"
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"

[feature.basic.pypi-dependencies]
ipywidgets = ">=8.1.3, <9"
ipyevents = ">=2.0.1"
ipympl = ">=0.8.2"
ipycanvas = ">=0.9.1"
ipyleaflet = "*"
plotly = ">=6, <7"
bqplot = "*"
anywidget = ">=0.11.0, <0.12"
numpy = ">=2.4.6, <3"
matplotlib = ">=3.11.0, <4"
scipy = ">=1.17.1, <2"
pandas = ">=3.0.4, <4"

[feature.jupyterlite.pypi-dependencies]
jupyterlite-core = "==0.7.1"
jupyterlab = "~=4.5.1"
notebook = "~=7.5.1"
jupyterlite-pyodide-kernel = "==0.7.0"
jupyterlab-fasta = ">=3.3.0, <4"
jupyterlab-geojson = ">=3.4.0, <4"
jupyterlab-night = "*"
jupyterlab-miami-nights = "*"
jupyterlab-open-url-parameter = "==0.4.0"
jupyterlite-pdf-exporter = ">=0.3.0"
jupyterlab-filesystem-access = "*"

[environments]
jupyterlite = { features = ["jupyterlite", "basic"] }

[pypi-dependencies]

[tasks.build]
cmd = "jupyter lite build --contents content --output-dir dist"
default-environment = "jupyterlite"
cwd = "lite-dir"
